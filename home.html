  <body class="font-geist">
    <!-- navbar -->
    <header>
      <div class="navbar bg-base-100 shadow-sm flex justify-between px-20">
        <div class="flex justify-center items-center gap-1">
          <img class="w-[36px]" src="./assets/github-logo.png" alt="" />
          <h3 class="text-2xl font-semibold text-[#1F2937]">
            GitHub Issues Tracker
          </h3>
        </div>
        <div class="flex gap-4">
          <div class="">
            <label class="input validator join-item">
              <div
                class="flex items-center justify-center gap-1 text-[#64748B]"
              >
                <i class="fa-brands fa-sistrix"></i>
                <input type="text" placeholder="Search issues..." required />
              </div>
            </label>
          </div>
          <button class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>New Issue
          </button>
        </div>
      </div>
    </header>

    <main>
      <!-- tab bar -->
      <section
        class="w-11/12 mt-15 mb-4 mx-auto rounded-lg bg-white shadow-sm p-6"
      >
        <div class="flex gap-2">
          <button class="btn btn-primary py-3 px-9">All</button>
          <button class="btn btn-primary py-3 px-9">Open</button>
          <button class="btn btn-primary py-3 px-9">Close</button>
        </div>
      </section>

      <!-- dashboard -->
      <section class="w-11/12 mx-auto bg-white shadow-sm rounded-lg">
        <!-- dashboard counter -->
        <div class="flex justify-between p-6 shadow-sm">
          <div class="flex justify-center items-center gap-2">
            <div class="">
              <img src="./assets/Aperture.png" alt="" />
            </div>
            <div class="">
              <h3 class="text-[20px]j font-semibold text-[#1F2937]">
                <span>50</span> Issues
              </h3>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex justify-center items-center gap-4">
            <p><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</p>
            <p><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</p>
          </div>
        </div>

        <!-- issue card container -->
        <div id="issue-container" class="grid grid-cols-1 sm:grid-cols-4 gap-4 p-6">
