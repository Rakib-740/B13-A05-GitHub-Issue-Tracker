<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>

    <!-- DaisyUI & Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- styles -->
    <style>
      .font-geist {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>

  <body class="font-geist">
    <section class="min-h-screen flex flex-col justify-center items-center">
      <form class="flex flex-col justify-center items-center">
        <fieldset
          class="fieldset bg-white border-base-300 rounded-box border p-7"
        >
          <div class="flex flex-col justify-center items-center">
            <img class="mb-6" src="./assets/github-logo.png" alt="" />
            <h3 class="text-2xl font-semibold mb-1">GitHub Issues Tracker</h3>
            <p class="text-[#64748B] mb-6">Sign in to manage your issues</p>
          </div>

          <label class="font-semibold">Username</label>
          <input
            id="user-name"
            type="text"
            class="input w-full px-4 py-4 rounded-md"
            placeholder="Enter Username"
          />
          <p class="text-[#4A00FF]">Default: admin</p>

          <label class="font-semibold">Password</label>
          <input
            id="pass-word"
            type="password"
            class="input w-full px-4 py-4 rounded-md"
            placeholder="Enter Password"
          />
          <p class="text-[#4A00FF]">Default: admin123</p>

          <button id="log-in" class="btn btn-primary mt-4">Login</button>

          <div class="flex justify-center items-center gap-2 my-6">
            <hr class="w-1/2 text-[#E4E4E7]" />
            <p class="text-[#1F2937]">OR</p>
            <hr class="w-1/2 text-[#E4E4E7]" />
          </div>

          <div class="space-y-2">
            <p class="text-center text-[#64748B]">Demo Credentials:</p>
            <div class="flex flex-col text-center p-6 bg-[#F8FAFC] rounded-md">
              <p><span class="font-semibold">Username:</span> admin</p>
              <p><span class="font-semibold">Password:</span> admin123</p>
            </div>
          </div>
        </fieldset>
      </form>
    </section>

    <script src="./scripts/login.js"></script>
  </body>
</html>
